<p>坐在墨镜后面<br>细数浪头个数和心绪<br>流移的人<br>对世界抱有<br>无神论者对上帝<br>的那种朴素的爱</p>
<p>如果只有反光<br>和一面镜子<br>就不会有太多话<br>偶尔聊起天气<br>聊云的筋骨<br>聊雨的无常<br>聊雾的隐身术</p>
<p>有时险些聊起爱<br>监视器后面的<br>人摘下墨镜<br>及时叫停<br>你只看到<br>他的眼眶乌青<br>他的瞳仁碧绿</p>

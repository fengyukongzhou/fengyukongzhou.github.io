<span id="more"></span>
<p>远看是静物画<br>近看是风沙消化千万遍后<br>神的骨头<br>结结实实烙印着<br>炙热的马蹄声</p>
<p>笔尖刺透油彩和纸面<br>在沙漠的腹部留下<br>缝衣针似的枯井<br>井底一圈圈髑髅<br>还在沉思<br>蒸干的脑海中<br>翻涌着<br>牦牛群排列的诗行</p>
<p>那被遗弃的世界<br>还不时回想<br>马掌踏碎骨头的声音<br>想到乌云密布的卧房里<br>神的眼珠刺绣着眼帘<br>看见睡梦中的沙丘<br>缓缓翻身</p>
<p align="right">24/07/10</p>
